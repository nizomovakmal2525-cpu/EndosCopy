<!DOCTYPE html>

<head>

<title>EndoScan AI — Tarix</title>
<link href="./EndoScan AI_files/css2" rel="stylesheet">
<link rel="stylesheet" href="./EndoScan AI_files/endoscan-ai.css">

<body data-endoscan-page="history">

<div class="shell">

  <aside class="sidebar">
    <div class="logo-wrap" onclick="goToHomePage()">
      <div class="logo-dot">
        <svg viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="5.5" stroke="#fff" stroke-width="1.4"/>
          <circle cx="8" cy="8" r="2" fill="#fff"/>
          <path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="logo-name">EndoScan AI</div>
        <div class="logo-sub">v2.4 · Medical</div>
      </div>
    </div>

    <div class="nav-block">
      <div class="nav-item" data-nav="home" onclick="goToHomePage()">
        <svg viewBox="0 0 14 14" fill="none"><path d="M2 6.5L7 2l5 4.5V12a1 1 0 01-1 1H3a1 1 0 01-1-1V6.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
        Bosh sahifa
      </div>
      <div class="nav-item" data-nav="news" onclick="goToNewsPage()">

        Yangiliklar
      </div>
      <div class="nav-item" data-nav="analyze" data-require-auth onclick="goToAnalysisPage()">
        <svg viewBox="0 0 14 14" fill="none"><path d="M7 1l1.2 2.9L11 4.4l-2.5 2.4.6 3.4L7 8.8 3.4 10.2l.6-3.4L1 4.4l3.8-.5L7 1z" fill="currentColor"/></svg>
        AI Tahlil
      </div>
      <div class="nav-item active" data-nav="history" data-require-auth onclick="showHistory()">
        <svg viewBox="0 0 14 14" fill="none"><path d="M7 1v6l3 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.2"/></svg>
        Tarix
      </div>
      <div class="nav-item" onclick="goToSection('about-section')">
        <svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.2"/><path d="M7 4v3m0 3h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Biz haqimizda
      </div>
      <div class="nav-item" onclick="goToSection('contact-section')">
        <svg viewBox="0 0 14 14" fill="none"><path d="M13 1L1 6l4.5 2L13 1zM5.5 8l2 5 5.5-12-7.5 7z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
        Aloqa
      </div>
    </div>

    <div class="user-block">
      <span class="topbar-stat-pill">
        <svg viewBox="0 0 16 16" fill="none"><path d="M8 8a3 3 0 100-6 3 3 0 000 6zM3 14c0-2.8 2.2-5 5-5s5 2.2 5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <span data-visitor-count>32 ta foydalanuvchi</span>
      </span>
      <button class="theme-btn" onclick="toggleTheme()" title="Tungi rejim">
        <svg id="iconMoon" viewBox="0 0 16 16" fill="none"><path d="M13.5 10.5A6 6 0 015.5 2.5a6 6 0 108 8z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <svg id="iconSun" viewBox="0 0 16 16" fill="none" style="display:none"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
      <div class="nav-item" style="cursor: default;">
        <svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="5" r="2.5" stroke="currentColor" stroke-width="1.2"/><path d="M2 12c0-2.8 2.2-5 5-5s5 2.2 5 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        <span id="sidebarUserName" style="font-weight: 600;">Mehmon</span>
      </div>
      <button class="glass-btn btn-login" id="btnLogin" type="button" onclick="goToLoginPage()">Kirish</button>
      <button class="glass-btn btn-logout" id="btnLogout" type="button" onclick="logout()" style="display:none">Chiqish</button>
    </div>
  </aside>

  <div class="main-wrapper">
    <!-- History View -->
    <div id="historyView" style="display: block; padding-top: 20px;" class="view-container">
      <div class="history-grid" id="historyGrid"></div>
    </div>
  </div>

<script src="./EndoScan AI_files/endoscan-ai.js.download"></script>
</body>
