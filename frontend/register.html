<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EndoScan AI - Ro'yxatdan o'tish</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{url_for('static', path='auth.css')}}">
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-header">
    <div class="auth-logo">
      <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.4"/><circle cx="8" cy="8" r="2" fill="currentColor"/><path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    </div>
    <h1 class="auth-title">Ro'yxatdan o'tish</h1>
    <p class="auth-subtitle">Yangi hisob yarating</p>
  </div>

  {% if error %}
  <div class="error-banner">{{ error }}</div>
  {% endif %}

  <form action="/register" method="post">
    <div class="form-group">
      <label class="form-label">Foydalanuvchi nomi</label>
      <input type="text" name="username" class="form-input" placeholder="yangi username" required autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Parol</label>
      <input type="password" name="password" class="form-input" placeholder="••••••••" required autocomplete="new-password">
    </div>
    <button type="submit" class="auth-btn">Ro'yxatdan o'tish</button>
  </form>

  <div class="auth-footer">
    Hisobingiz bormi? <a href="/login" class="auth-link">Kirish</a>
  </div>
</div>

</body>
</html>
