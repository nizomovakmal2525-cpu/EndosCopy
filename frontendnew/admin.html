<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EndoScan AI - Admin Dashboard</title>
<link href="/static/css/fonts.css" rel="stylesheet">
<link rel="stylesheet" href="/static/css/stats-dashboard.css">
</head>
<body class="stats-body" data-stats-scope="admin" data-stats-section="{{ section }}" data-current-user="{{ user.sub if user else 'Admin' }}">
<div class="stats-app">
  <aside class="stats-sidebar">
    <div class="stats-brand" onclick="location.href='/'">
      <div class="stats-brand-mark">E</div>
      <div>
        <div class="stats-brand-name">EndoScan AI Admin</div>
        <div class="stats-brand-sub">Platform control</div>
      </div>
    </div>
    <nav class="stats-nav" id="statsNav"></nav>
  </aside>

  <main class="stats-main">
    <header class="stats-topbar">
      <input class="stats-search" type="search" placeholder="Search admin data..." aria-label="Search admin data">
      <div class="stats-topbar-actions">
        <div class="stats-notification-shell">
          <button class="stats-icon-button" type="button" id="statsNotificationButton" aria-label="Notifications" aria-expanded="false">
            <span class="stats-bell">&#128276;</span>
            <span class="stats-notification-badge" id="statsNotificationBadge">0</span>
          </button>
          <section class="stats-notification-menu" id="statsNotificationMenu"></section>
        </div>
        <div class="stats-profile">
          <span class="stats-profile-dot"></span>
          <span id="statsProfileName">Admin</span>
        </div>
      </div>
    </header>

    <section class="stats-content">
      <div class="stats-title-row">
        <div>
          <h1 id="statsTitle">Welcome to Admin Dashboard</h1>
          <p id="statsSubtitle">The global overview of platform activity.</p>
        </div>
        <a class="stats-home-link" href="/">Main site</a>
      </div>

      <div class="stats-filter-row" id="statsFilters"></div>
      <div class="stats-card-grid" id="statsCards"></div>
      <section class="stats-panel" id="statsNotifications"></section>
      <div class="stats-panel-grid" id="statsPanels"></div>
      <div class="stats-chart-grid" id="statsCharts"></div>
      <section class="stats-panel" id="statsTimeline"></section>
      <section class="stats-panel" id="statsForm"></section>

      <div class="stats-grid-2">
        <section class="stats-panel" id="statsTable"></section>
        <section class="stats-panel" id="statsNotes"></section>
      </div>
      <div class="stats-action-row" id="statsActions"></div>
    </section>
  </main>
</div>

<script src="/static/js/stats-dashboard.js"></script>
</body>
</html>
