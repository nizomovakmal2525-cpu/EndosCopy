<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EndoScan AI — Ro'yxatdan o'tish</title>
<link href="/static/css/fonts.css" rel="stylesheet">
<link rel="stylesheet" href="/static/css/endoscan-ai.css">
</head>
<body data-endoscan-page="register">

<button type="button" class="theme-btn login-theme-btn" onclick="toggleTheme()" title="Tungi rejim" style="position:fixed;top:16px;right:16px;z-index:10">
  <svg id="iconMoon" viewBox="0 0 16 16" fill="none"><path d="M13.5 10.5A6 6 0 015.5 2.5a6 6 0 108 8z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
  <svg id="iconSun" viewBox="0 0 16 16" fill="none" style="display:none"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
</button>

<div class="login-page">
  <div class="login-card glass-card">
    <div class="login-logo" onclick="location.href='/'">
      <div class="logo-dot">
        <svg viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="5.5" stroke="#fff" stroke-width="1.4"/>
          <circle cx="8" cy="8" r="2" fill="#fff"/>
          <path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="logo-name">EndoScan AI</div>
        <div class="logo-sub">Ro'yxatdan o'tish</div>
      </div>
    </div>

    <h1>Yangi hisob yarating</h1>
    <p class="login-hint">Ma'lumotlaringizni kiriting va tahlil imkoniyatlaridan foydalaning.</p>

    <form id="registerForm" onsubmit="submitRegister(event)">
      <label class="login-field">
        <span>Foydalanuvchi nomi</span>
        <input type="text" id="regUsername" name="username" autocomplete="username" required placeholder="masalan: ali123">
      </label>
      <label class="login-field">
        <span>Parol</span>
        <input type="password" id="regPassword" name="password" autocomplete="new-password" required placeholder="••••••">
      </label>
      <label class="login-field">
        <span>Parolni tasdiqlang</span>
        <input type="password" id="regConfirmPassword" name="confirm_password" autocomplete="new-password" required placeholder="••••••">
      </label>
      <p id="regError" class="login-error" style="display:none"></p>
      <button type="submit" class="glass-btn btn-teal login-submit">Ro'yxatdan o'tish</button>
    </form>

    <div style="margin-top: 20px; text-align: center; font-size: 14px; color: var(--text2);">
      Hisobingiz bormi? <a href="/login" style="color: var(--teal); font-weight: 600; text-decoration: none;">Kirish</a>
    </div>

    <button type="button" class="login-back" onclick="location.href='/news'">Yangiliklarga qaytish</button>
  </div>
</div>

<script src="/static/js/endoscan-ai.js"></script>
</body>
</html>
